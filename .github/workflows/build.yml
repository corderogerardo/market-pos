name: Build Market POS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
            name: macOS
          - platform: ubuntu-22.04
            args: ""
            name: Linux
          - platform: windows-latest
            args: ""
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller
        shell: bash

      - name: Build backend binary (PyInstaller)
        run: python scripts/build-backend.py
        shell: bash

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.args }}

      - name: Sign macOS app and recreate DMG
        if: matrix.platform == 'macos-latest'
        run: |
          # Find the .app bundle
          APP=$(find frontend/src-tauri/target/release/bundle/macos -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found, skipping signing"
            exit 0
          fi

          echo "Signing: $APP"

          # Sign the sidecar binary first
          find "$APP" -name "market-pos-api-*" -exec codesign --force --sign - {} \;

          # Sign all frameworks and dylibs
          find "$APP" -name "*.dylib" -exec codesign --force --sign - {} \;
          find "$APP" -name "*.framework" -type d -exec codesign --force --sign - {} \;

          # Sign the main app bundle (deep)
          codesign --force --deep --sign - "$APP"

          # Verify signature
          codesign --verify --verbose "$APP" && echo "Signature valid" || echo "Signature check failed"

          # Recreate DMG with properly signed app
          DMG_DIR="frontend/src-tauri/target/release/bundle/dmg"
          mkdir -p "$DMG_DIR"
          APP_NAME=$(basename "$APP" .app)

          # Remove old DMGs
          rm -f "$DMG_DIR"/*.dmg

          # Create new DMG
          DMG_PATH="$DMG_DIR/${APP_NAME}_$(uname -m).dmg"
          hdiutil create -volname "$APP_NAME" -srcfolder "$APP" -ov -format UDZO "$DMG_PATH"
          echo "Created signed DMG: $DMG_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: market-pos-${{ matrix.name }}
          path: |
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/msi/*.msi
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Create Release
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## Installation

            | Platform | File |
            |----------|------|
            | macOS | `.dmg` |
            | Windows | `.exe` |
            | Linux | `.AppImage` or `.deb` |

            ### macOS: first launch
            Since the app is not notarized with Apple, macOS may block it on first open.
            After installing, run this command in Terminal:
            ```
            xattr -cr /Applications/Market\ POS.app
            ```
            Or go to **System Settings > Privacy & Security** and click **Open Anyway**.
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            artifacts/**/*.exe
